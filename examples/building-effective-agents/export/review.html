<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TranslationStack Review</title>
  <style>
    :root {
      --bg: #FAF9F5;
      --surface: #FFFFFF;
      --text: #141413;
      --text-2: #3D3D3A;
      --text-3: #87867F;
      --border: #D1CFC5;
      --border-light: #E6E3DA;
      --accent-a: #788C5D;
      --accent-a-border: #B9C3A8;
      --accent-b: #D97757;
      --muted-bg: #F0EEE6;
      --bad: #A4493D;
      --bad-bg: #FFF5F2;
      --bad-border: #D8A8A0;
      --serif: ui-serif, Georgia, "Noto Serif SC", serif;
      --sans: system-ui, -apple-system, "PingFang SC", sans-serif;
      --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      border-radius: 0 !important;
    }

    svg rect {
      rx: 0;
      ry: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.6;
    }

    button {
      font: inherit;
    }

    .shell {
      max-width: 1180px;
      margin: 0 auto;
      padding: 34px 20px 64px;
    }

    .masthead {
      padding: 0 0 22px;
      border-bottom: 1px solid var(--border);
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 12px;
      color: var(--accent-b);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .masthead h1 {
      max-width: 920px;
      margin: 0;
      color: var(--text);
      font-family: var(--serif);
      font-size: 54px;
      font-weight: 700;
      line-height: 1.04;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .summary {
      max-width: 780px;
      margin: 14px 0 0;
      color: var(--text-2);
      font-size: 15px;
      line-height: 1.65;
      overflow-wrap: anywhere;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 18px;
    }

    .meta-chip {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 3px 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-2);
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.4;
      max-width: 100%;
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .top-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0;
      margin-top: 22px;
      border-top: 1px solid var(--border-light);
      border-bottom: 1px solid var(--border);
    }

    .top-nav button {
      appearance: none;
      padding: 10px 14px;
      border: 0;
      border-right: 1px solid var(--border-light);
      background: transparent;
      color: var(--text-2);
      cursor: pointer;
      font-family: var(--mono);
      font-size: 11px;
      transition: color 120ms ease, border-color 120ms ease;
    }

    .top-nav button:first-child {
      border-left: 1px solid var(--border-light);
    }

    .top-nav button:hover,
    .top-nav button.active {
      background: var(--surface);
      color: var(--accent-b);
      border-color: var(--border);
    }

    .top-nav button:focus-visible,
    .tab-nav button:focus-visible,
    details.chunk-card summary:focus-visible {
      outline: 2px solid var(--accent-b);
      outline-offset: -2px;
    }

    .content {
      margin: 28px 0 0;
      min-width: 0;
    }

    .panel {
      margin-top: 0;
    }

    .panel[hidden] {
      display: none !important;
    }

    .sec-head {
      display: flex;
      align-items: baseline;
      gap: 14px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .sec-head .num {
      color: var(--accent-a);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
    }

    .sec-head h2 {
      margin: 0;
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0;
      line-height: 1.2;
    }

    .metrics-strip {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      border: 1px solid var(--border);
      background: var(--surface);
    }

    .metric {
      min-height: 112px;
      padding: 14px;
      border-right: 1px solid var(--border-light);
    }

    .metric:last-child {
      border-right: 0;
    }

    .metric-label {
      color: var(--text-3);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .metric-value {
      display: block;
      margin-top: 8px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 30px;
      font-weight: 800;
      line-height: 1;
      overflow-wrap: anywhere;
    }

    .metric-foot {
      margin-top: 10px;
      color: var(--text-3);
      font-size: 12px;
      line-height: 1.45;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .info-card {
      border: 1px solid var(--border);
      background: var(--surface);
      padding: 16px;
    }

    .info-card h3 {
      margin: 0;
      font-family: var(--serif);
      font-size: 18px;
      line-height: 1.25;
    }

    .info-card p {
      margin: 10px 0 0;
      color: var(--text-2);
    }

    .evidence {
      margin-top: 12px;
      padding: 8px 0 8px 10px;
      border-left: 2px solid var(--accent-a);
      color: var(--text-3);
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.5;
    }

    .tab-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0;
      margin-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    .tab-nav button {
      appearance: none;
      padding: 9px 14px;
      border: 1px solid var(--border-light);
      border-bottom: 0;
      background: var(--muted-bg);
      color: var(--text-2);
      cursor: pointer;
      font-family: var(--mono);
      font-size: 11px;
      transition: color 120ms ease, border-color 120ms ease;
    }

    .tab-nav button + button {
      border-left: 0;
    }

    .tab-nav button:hover,
    .tab-nav button.active {
      border-color: var(--border);
      background: var(--surface);
      color: var(--accent-b);
    }

    .details-list {
      display: grid;
      gap: 14px;
      min-width: 0;
    }

    .filter-empty {
      display: none;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-3);
      padding: 14px;
      font-family: var(--mono);
      font-size: 11px;
    }

    .filter-empty.visible {
      display: block;
    }

    details.chunk-card {
      max-width: 100%;
      min-width: 0;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface);
    }

    details.chunk-card[hidden] {
      display: none !important;
    }

    details.chunk-card summary {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 12px;
      align-items: center;
      padding: 13px 14px;
      cursor: pointer;
      list-style: none;
      border-bottom: 1px solid transparent;
    }

    details.chunk-card[open] summary {
      border-bottom-color: var(--border-light);
      background: var(--muted-bg);
    }

    details.chunk-card summary::-webkit-details-marker {
      display: none;
    }

    .chunk-title {
      min-width: 0;
    }

    .chunk-title strong {
      display: block;
      color: var(--text);
      font-size: 14px;
      line-height: 1.35;
    }

    .chunk-title span {
      display: block;
      margin-top: 3px;
      overflow: hidden;
      color: var(--text-3);
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .state-badge,
    .count-badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-2);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .state-badge.reviewed,
    .state-badge.exported {
      border-color: var(--accent-a-border);
      color: var(--accent-a);
    }

    .state-badge.stale,
    .state-badge.blocked {
      border-color: var(--bad-border);
      color: var(--bad);
    }

    .chunk-body {
      min-width: 0;
      padding: 14px;
    }

    .chunk-summary {
      margin: 0 0 14px;
      color: var(--text-2);
    }

    .segment-grid {
      display: grid;
      min-width: 720px;
      border: 1px solid var(--border-light);
    }

    .segment-row {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr) minmax(0, 1fr);
      border-bottom: 1px solid var(--border-light);
    }

    .segment-row:last-child {
      border-bottom: 0;
    }

    .segment-cell {
      min-width: 0;
      padding: 11px 12px;
      border-right: 1px solid var(--border-light);
      background: var(--surface);
    }

    .segment-cell:last-child {
      border-right: 0;
    }

    .segment-row.header .segment-cell {
      background: var(--muted-bg);
      color: var(--text-3);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .segment-id {
      color: var(--text-3);
      font-family: var(--mono);
      font-size: 11px;
      overflow-wrap: anywhere;
    }

    .text-block {
      color: var(--text-2);
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .target-block {
      color: var(--text);
    }

    .issue-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .issue {
      padding: 10px 12px;
      border: 1px solid var(--bad-border);
      background: var(--bad-bg);
      color: var(--text-2);
    }

    .issue strong {
      color: var(--bad);
      font-family: var(--mono);
      font-size: 11px;
      text-transform: uppercase;
    }

    .intent-grid {
      display: grid;
      min-width: 620px;
      border: 1px solid var(--border);
      background: var(--surface);
    }

    .intent-row {
      display: grid;
      grid-template-columns: minmax(120px, 0.7fr) minmax(120px, 0.7fr) minmax(220px, 1.4fr);
      border-bottom: 1px solid var(--border-light);
    }

    .intent-row:last-child {
      border-bottom: 0;
    }

    .intent-cell {
      min-width: 0;
      padding: 10px 12px;
      border-right: 1px solid var(--border-light);
      overflow-wrap: anywhere;
    }

    .intent-cell:last-child {
      border-right: 0;
    }

    .intent-row.header .intent-cell {
      background: var(--muted-bg);
      color: var(--text-3);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .mono {
      font-family: var(--mono);
      font-size: 11px;
    }

    .empty {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-3);
      padding: 14px;
      font-family: var(--mono);
      font-size: 11px;
    }

    .overflow-wrap {
      max-width: 100%;
      min-width: 0;
      overflow-x: auto;
    }

    .footer {
      margin-top: 56px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      color: var(--text-3);
      font-family: var(--mono);
      font-size: 11px;
      overflow-wrap: anywhere;
    }

    @media (max-width: 860px) {
      .shell {
        padding: 26px 14px 48px;
      }

      .content {
        margin-left: 0;
      }

      .masthead h1 {
        font-size: 34px;
      }

      .metrics-strip,
      .card-grid {
        grid-template-columns: 1fr;
      }

      .metric {
        border-right: 0;
        border-bottom: 1px solid var(--border-light);
      }

      .metric:last-child {
        border-bottom: 0;
      }

      details.chunk-card summary {
        grid-template-columns: 1fr;
      }

      .chunk-title span {
        white-space: normal;
      }
    }
  </style>
</head>

{"source":"human oversight","target":"人类监督","note":"agents 应用共性之一。"},{"source":"ground truth","target":"真实信号","note":"指 agent 在执行中获得的工具调用/代码执行等环境反馈。"},{"source":"stopping conditions","target":"停止条件","note":"agents 的迭代终止条件（如最大迭代次数）。"},{"source":"evals","target":"evals","note":"evaluations 的缩写，自动化评估 LLM 表现；保留英文。"},{"source":"usage-based pricing","target":"按用量计费","note":"客服 agent 按成功解决量计费的商业模式。"},{"source":"documentation and testing","target":"文档与测试","note":"ACI 设计的核心动作。"},{"source":"junior developer","target":"初级开发者","note":"tool docstring 设计的比喻对象。"}],"chunks":[{"id":"c01.intro","title":"Title and lead paragraphs","summary":"文章标题、发布日期与三段导语；阐述作者观察：成功的 LLM agent 实现多用简单可组合模式而非复杂框架。","state":"reviewed","segments":[{"id":"c01.intro","source":"# Building effective agents\n\nPublished Dec 19, 2024\n\nWe've worked with dozens of teams building LLM agents across industries. Consistently, the most successful implementations use simple, composable patterns rather than complex frameworks.\n\nOver the past year, we've worked with dozens of teams building large language model (LLM) agents across industries. Consistently, the most successful implementations weren't using complex frameworks or specialized libraries. Instead, they were building with simple, composable patterns.\n\nIn this post, we share what we've learned from working with our customers and building agents ourselves, and give practical advice for developers on building effective agents.","target":"# 构建高效的智能体\n\n发布于 2024 年 12 月 19 日\n\n我们与数十个跨行业构建 LLM 智能体的团队有过合作。一致观察到，最成功的实现依靠的是简单、可组合的模式，而不是复杂的框架。\n\n过去一年里，我们与数十个跨行业构建大语言模型（LLM）智能体的团队合作。一致观察到，最成功的实现既没有使用复杂框架，也没有依赖专用库，而是在用简单、可组合的模式来构建。\n\n在本文中，我们分享与客户合作以及自身构建智能体过程中的心得，并为开发者提供一些构建高效智能体的实用建议。","state":"reviewed","issues":[]}],"issues":[]},{"id":"c02.what_are_agents","title":"What are agents?","summary":"给出 Anthropic 对 agent 的定义，并区分 workflows 与 agents；明确本文统一使用 agentic systems 一词涵盖两者。","state":"reviewed","segments":[{"id":"c02.what_are_agents","source":"## What are agents?\n\n\"Agent\" can be defined in several ways. Some customers define agents as fully autonomous systems that operate independently over extended periods, using various tools to accomplish complex tasks. Others use the term to describe more prescriptive implementations that follow predefined workflows. At Anthropic, we categorize all these variations as **agentic systems**, but draw an important architectural distinction between **workflows** and **agents**:\n\n- **Workflows** are systems where LLMs and tools are orchestrated through predefined code paths.\n- **Agents**, on the other hand, are systems where LLMs dynamically direct their own processes and tool usage, maintaining control over how they accomplish tasks.\n\nBelow, we will explore both types of agentic systems in detail. In Appendix 1 (\"Agents in Practice\"), we describe two domains where customers have found particular value in using these kinds of systems.","target":"## 什么是智能体？\n\n\"智能体（agent）\"有多种定义方式。一些客户把智能体定义为完全自主、能在长时间跨度内独立运作的系统，它们会调用各种工具来完成复杂任务。也有客户用这个词来描述更遵循既定流程的实现——即沿着预定义的工作流执行。在 Anthropic，我们把所有这些变体统称为**智能体系统（agentic systems）**，但在其中做了一个重要的架构区分——**工作流（workflows）**与**智能体（agents）**：\n\n- **工作流**是按预定义代码路径来编排 LLM 与工具的系统。\n- **智能体**则相反，是由 LLM 动态决定自身的执行流程与工具调用，并在完成任务的方式上保留自主权。\n\n下文将分别深入探讨这两种智能体系统。在附录 1（\"Agents in Practice\"）中，我们会介绍两个客户已经在使用这些系统并获得显著价值的领域。","state":"reviewed","issues":[]}],"issues":[]},{"id":"c03.when_to_use","title":"When (and when not) to use agents","summary":"建议从最简方案出发，仅在确有必要时增加复杂度；workflows 适合定义明确的任务，agents 适合需要灵活性与模型决策的场景。","state":"reviewed","segments":[{"id":"c03.when_to_use","source":"## When (and when not) to use agents\n\nWhen building applications with LLMs, we recommend finding the simplest solution possible, and only increasing complexity when needed. This might mean not building agentic systems at all. Agentic systems often trade latency and cost for better task performance, and you should consider when this tradeoff makes sense.\n\nWhen more complexity is warranted, workflows offer predictability and consistency for well-defined tasks, whereas agents are the better option when flexibility and model-driven decision-making are needed at scale. For many applications, however, optimizing single LLM calls with retrieval and in-context examples is usually enough.","target":"## 何时（以及何时不该）使用智能体\n\n在用 LLM 构建应用时，我们建议先寻找最简单的可行方案，只在确有需要时再增加复杂度——这甚至可能意味着根本不去构建智能体系统。智能体系统通常以更高的延迟和成本为代价来换取更好的任务表现，应当审慎评估这种取舍是否值得。\n\n当确有复杂度需求时，工作流适合那些任务定义明确、需要可预测性和一致性的场景；而智能体则更适合需要在规模化条件下保持灵活性、让模型驱动决策的场景。不过，对多数应用而言，把单次 LLM 调用与检索、上下文示例结合优化，通常就足够了。","state":"reviewed","issues":[]}],"issues":[]},{"id":"c04.frameworks","title":"When and how to use frameworks","summary":"列出 4 个常见 agentic 框架（Claude Agent SDK、Strands Agents SDK、Rivet、Vellum）；警告抽象层会掩盖底层 prompt 并诱发过度工程化；建议先直连 LLM API。","state":"reviewed","segments":[{"id":"c04.frameworks","source":"## When and how to use frameworks\n\nThere are many frameworks that make agentic systems easier to implement, including:\n\n- The [Claude Agent SDK](https://platform.claude.com/docs/en/agent-sdk/overview);\n- [Strands Agents SDK by AWS](https://strandsagents.com/latest/);\n- [Rivet](https://rivet.ironcladapp.com/), a drag and drop GUI LLM workflow builder; and\n- [Vellum](https://www.vellum.ai/), another GUI tool for building and testing complex workflows.\n\nThese frameworks make it easy to get started by simplifying standard low-level tasks like calling LLMs, defining and parsing tools, and chaining calls together. However, they often create extra layers of abstraction that can obscure the underlying prompts and responses, making them harder to debug. They can also make it tempting to add complexity when a simpler setup would suffice.\n\nWe suggest that developers start by using LLM APIs directly: many patterns can be implemented in a few lines of code. If you do use a framework, ensure you understand the underlying code. Incorrect assumptions about what's under the hood are a common source of customer error.\n\nSee our [cookbook](https://platform.claude.com/cookbook/patterns-agents-basic-workflows) for some sample implementations.","target":"## 何时以及如何选择框架\n\n目前有不少框架可以简化智能体系统的实现，包括：\n\n- [Claude Agent SDK](https://platform.claude.com/docs/en/agent-sdk/overview)；\n- [Strands Agents SDK（AWS）](https://strandsagents.com/latest/)；\n- [Rivet](https://rivet.ironcladapp.com/)，一款拖拽式 LLM 工作流 GUI 构建器；以及\n- [Vellum](https://www.vellum.ai/)，另一款用于构建和测试复杂工作流的 GUI 工具。\n\n这些框架通过简化调用 LLM、定义与解析工具、把多个调用串联起来等标准底层任务，让上手变得更容易。但它们往往引入额外的抽象层，掩盖底层的 prompt 与响应，让调试变得更困难；也容易诱使人在简单方案就足够的情况下，不必要地增加复杂度。\n\n我们建议开发者先直接使用 LLM API：很多模式用几行代码就能实现。如果确实要使用框架，请确保自己理解其底层代码——对底层机制的错误假设是客户实践中常见的问题来源。\n\n一些示例实现可参考我们的 [cookbook](https://platform.claude.com/cookbook/patterns-agents-basic-workflows)。","state":"reviewed","issues":[{"id":"i-term-004","target_id":"c04.frameworks","type":"term","severity":"low","status":"resolved","scope":"chunk","created_by":"ai","note":"Glossary target is 'Strands Agents SDK（AWS）' but translation kept source verbatim 'Strands Agents SDK by AWS'; will apply the Chinese-paren form per glossary.","evidence":{"source_excerpt":"[Strands Agents SDK by AWS](https://strandsagents.com/latest/)","target_excerpt":"[Strands Agents SDK by AWS](https://strandsagents.com/latest/)"}}]}],"issues":[]},{"id":"c05.building_blocks_intro","title":"Building blocks, workflows, and agents (intro)","summary":"本章的总体路线图：从 augmented LLM 这个基础块出发，逐步叠加到 autonomous agent。","state":"reviewed","segments":[{"id":"c05.building_blocks_intro","source":"## Building blocks, workflows, and agents\n\nIn this section, we'll explore the common patterns for agentic systems we've seen in production. We'll start with our foundational building block—the augmented LLM—and progressively increase complexity, from simple compositional workflows to autonomous agents.","target":"## 构建块、工作流与智能体\n\n本节会展开介绍我们在生产环境中观察到的智能体系统常见模式。我们会从最基础、底层的构建块——增强型 LLM（augmented LLM）——出发，逐步叠加复杂度，从简单的可组合工作流一直推进到自主智能体。","state":"reviewed","issues":[]}],"issues":[]},{"id":"c06.augmented_llm","title":"Building block: The augmented LLM","summary":"基础构建块：通过 retrieval、tools、memory 增强的 LLM；推荐使用 Model Context Protocol (MCP) 接入第三方工具生态。","state":"reviewed","segments":[{"id":"c06.augmented_llm","source":"### Building block: The augmented LLM\n\nThe basic building block of agentic systems is an LLM enhanced with augmentations such as retrieval, tools, and memory. Our current models can actively use these capabilities—generating their own search queries, selecting appropriate tools, and determining what information to retain.\n\n![The augmented LLM](assets/01-augmented-llm.png)\n\nWe recommend focusing on two key aspects of the implementation: tailoring these capabilities to your specific use case and ensuring they provide an easy, well-documented interface for your LLM. While there are many ways to implement these augmentations, one approach is through our recently released [Model Context Protocol](https://www.anthropic.com/news/model-context-protocol), which allows developers to integrate with a growing ecosystem of third-party tools with a simple [client implementation](https://modelcontextprotocol.io/tutorials/building-a-client#building-mcp-clients).\n\nFor the remainder of this post, we'll assume each LLM call has access to these augmented capabilities.","target":"### 构建块：增强型 LLM\n\n智能体系统最基础的构建块是经过增强的 LLM——具备检索、工具、记忆等增强能力。当前的模型可以主动使用这些能力：自己生成搜索查询、选择合适的工具，并决定要保留哪些信息。\n\n![增强型 LLM](assets/01-augmented-llm.png)\n\n实现层面我们建议关注两个关键点：一是把这些能力裁剪到与你的具体用例相匹配；二是为你的 LLM 提供一个易用、文档完善的接口。实现这些增强的方式有多种，其中一种是借助我们最近发布的 [Model Context Protocol（MCP，模型上下文协议）](https://www.anthropic.com/news/model-context-protocol)，通过一个简单的[客户端实现](https://modelcontextprotocol.io/tutorials/building-a-client#building-mcp-clients)就能接入不断壮大的第三方工具生态。\n\n在本文余下部分，我们默认每次 LLM 调用都具备这些增强能力。","state":"reviewed","issues":[{"id":"i-term-001","target_id":"c06.augmented_llm","type":"term","severity":"medium","status":"resolved","scope":"chunk","created_by":"ai","note":"'tools' (noun capability, parallel to retrieval/memory) was rendered as '工具调用' (which is the glossary target for 'tool use'). Will change to '工具'.","evidence":{"source_excerpt":"an LLM enhanced with augmentations such as retrieval, tools, and memory","target_excerpt":"经过增强的 LLM——具备检索、工具调用、记忆等增强能力"}}]}],"issues":[]},{"id":"c07.prompt_chaining","title":"Workflow: Prompt chaining","summary":"Prompt chaining 模式：把任务拆成步骤链，每步 LLM 处理上一步输出，中间可加 gate 检查；适合可清晰拆分的固定子任务。","state":"reviewed","segments":[{"id":"c07.prompt_chaining","source":"### Workflow: Prompt chaining\n\nPrompt chaining decomposes a task into a sequence of steps, where each LLM call processes the output of the previous one. You can add programmatic checks (see \"gate\" in the diagram below) on any intermediate steps to ensure that the process is still on track.\n\n![The prompt chaining workflow](assets/02-prompt-chaining.png)\n\n**When to use this workflow:** This workflow is ideal for situations where the task can be easily and cleanly decomposed into fixed subtasks. The main goal is to trade off latency for higher accuracy, by making each LLM call an easier task.\n\n**Examples where prompt chaining is useful:**\n\n- Generating Marketing copy, then translating it into a different language.\n- Writing an outline of a document, checking that the outline meets certain criteria, then writing the document based on the outline.","target":"### 工作流：提示链\n\n提示链（prompt chaining）把一项任务拆解为一系列步骤，每一步的 LLM 调用处理上一步的输出。你可以在任意中间步骤加编程式检查（见下图中的 \"gate\"），确保整个流程仍在正确轨道上。\n\n![提示链工作流](assets/02-prompt-chaining.png)\n\n**何时使用该工作流：**当任务可以清晰、干净地拆解为固定子任务时，提示链尤为合适。其核心目标是用更高的延迟换更高的准确率——让每一步 LLM 调用各自承担更简单的任务。\n\n**提示链的适用示例：**\n\n- 先生成营销文案，再把它翻译成另一种语言。\n- 先写一份文档大纲，检查大纲是否满足若干标准，再基于该大纲写出完整文档。","state":"reviewed","issues":[]}],"issues":[]},{"id":"c08.routing","title":"Workflow: Routing","summary":"Routing 模式：对输入分类后路由到专精的下游任务；适合存在明显类别且分类准确的复杂任务。","state":"reviewed","segments":[{"id":"c08.routing","source":"### Workflow: Routing\n\nRouting classifies an input and directs it to a specialized followup task. This workflow allows for separation of concerns, and building more specialized prompts. Without this workflow, optimizing for one kind of input can hurt performance on other inputs.\n\n![The routing workflow](assets/03-routing.png)\n\n**When to use this workflow:** Routing works well for complex tasks where there are distinct categories that are better handled separately, and where classification can be handled accurately, either by an LLM or a more traditional classification model/algorithm.\n\n**Examples where routing is useful:**\n\n- Directing different types of customer service queries (general questions, refund requests, technical support) into different downstream processes, prompts, and tools.\n- Routing easy/common questions to smaller, cost-efficient models like Claude Haiku 4.5 and hard/unusual questions to more capable models like Claude Sonnet 4.5 to optimize for best performance.","target":"### 工作流：路由\n\n路由（routing）先把输入分类，再导向某个专精的后续任务。这种工作流有助于关注点分离，便于构建更专精的 prompt。若不采用路由，针对某一类输入做优化，往往会牺牲其他输入上的表现。\n\n![路由工作流](assets/03-routing.png)\n\n**何时使用该工作流：**当任务较为复杂、可清晰拆分为若干更宜分开处理的类别，且分类能由 LLM 或更传统的分类模型/算法准确完成时，路由是合适的选择。\n\n**路由的适用示例：**\n\n- 把不同类型的客服咨询（一般问题、退款申请、技术支持）分别导向不同的下游流程、prompt 和工具。\n- 把简单/常见的问题路由到更小、更具性价比的模型（如 Claude Haiku 4.5），把困难/罕见的问题路由到能力更强的模型（如 Claude Sonnet 4.5），从而在整体上获得最佳性能。","state":"reviewed","issues":[]}],"issues":[]},{"id":"c09.parallelization","title":"Workflow: Parallelization","summary":"Parallelization 两种变体：Sectioning（拆分子任务并行）与 Voting（同一任务多 prompt 投票）；适合提速或需要多视角验证的场景。","state":"reviewed","segments":[{"id":"c09.parallelization","source":"### Workflow: Parallelization\n\nLLMs can sometimes work simultaneously on a task and have their outputs aggregated programmatically. This workflow, parallelization, manifests in two key variations:\n\n- **Sectioning**: Breaking a task into independent subtasks run in parallel.\n- **Voting:** Running the same task multiple times to get diverse outputs.\n\n![The parallelization workflow](assets/04-parallelization.png)\n\n**When to use this workflow:** Parallelization is effective when the divided subtasks can be parallelized for speed, or when multiple perspectives or attempts are needed for higher confidence results. For complex tasks with multiple considerations, LLMs generally perform better when each consideration is handled by a separate LLM call, allowing focused attention on each specific aspect.\n\n**Examples where parallelization is useful:**\n\n- **Sectioning**:\n  - Implementing guardrails where one model instance processes user queries while another screens them for inappropriate content or requests. This tends to perform better than having the same LLM call handle both guardrails and the core response.\n  - Automating evals for evaluating LLM performance, where each LLM call evaluates a different aspect of the model's performance on a given prompt.\n- **Voting**:\n  - Reviewing a piece of code for vulnerabilities, where several different prompts review and flag the code if they find a problem.\n  - Evaluating whether a given piece of content is inappropriate, with multiple prompts evaluating different aspects or requiring different vote thresholds to balance false positives and negatives.","target":"### 工作流：并行化\n\nLLM 有时可以同时处理一项任务，再用编程方式把各自的输出聚合起来。这种工作流（并行化，parallelization）有两种主要变体：\n\n- **分块（Sectioning）**：把任务拆为若干独立的子任务并行执行。\n- **投票（Voting）**：对同一任务运行多次以获得多样化的输出。\n\n![并行化工作流](assets/04-parallelization.png)\n\n**何时使用该工作流：**当拆出的子任务可以并行提速，或当需要多视角/多次尝试以获得更高置信度的结果时，并行化是有效的。对于涉及多种考量的复杂任务，LLM 通常在每项考量由独立的 LLM 调用负责时表现更好——这样每个方面都能获得专注的关注。\n\n**并行化的适用示例：**\n\n- **分块**：\n  - 实现护栏：一个模型实例处理用户查询，另一个实例专门审查其中是否有违规内容或不当请求。这种做法往往优于让同一次 LLM 调用同时处理护栏与核心回复。\n  - 自动化 evals 以评估 LLM 性能：每次 LLM 调用评估模型在某个 prompt 上某个不同维度的表现。\n- **投票**：\n  - 审查一段代码是否存在漏洞：用若干不同的 prompt 各自审查，一旦发现问题就标记。\n  - 评估一段内容是否违规：用多个 prompt 从不同角度评估，或设置不同投票阈值，以在误报与漏报之间取得平衡。","state":"reviewed","issues":[{"id":"i-term-002","target_id":"c09.parallelization","type":"term","severity":"medium","status":"resolved","scope":"global","created_by":"ai","note":"Glossary specifies 'guardrails' → '护栏'. Target drifted to '安全护栏' here; will change back to '护栏' for cross-chunk consistency. c12 will get the same fix.","evidence":{"source_excerpt":"Implementing guardrails where one model instance processes user queries while another screens them for inappropriate content or requests.","target_excerpt":"实现安全护栏：一个模型实例处理用户查询，另一个实例专门审查其中是否有违规内容或不当请求。"}},{"id":"i-term-003","target_id":"c09.parallelization","type":"term","severity":"low","status":"resolved","scope":"chunk","created_by":"ai","note":"Glossary prescribes 'evals' (Anthropic shorthand for evaluations) to be retained as English. Target rendered as '评估'; will change to '自动化 evals 以评估'.","evidence":{"source_excerpt":"Automating evals for evaluating LLM performance","target_excerpt":"自动化评估 LLM 性能"}}]}],"issues":[]},{"id":"c10.orchestrator_workers","title":"Workflow: Orchestrator-workers","summary":"中央 LLM 动态拆任务并委派给 worker LLM，再汇总结果；与 parallelization 区别在于子任务在运行时才确定。","state":"reviewed","segments":[{"id":"c10.orchestrator_workers","source":"### Workflow: Orchestrator-workers\n\nIn the orchestrator-workers workflow, a central LLM dynamically breaks down tasks, delegates them to worker LLMs, and synthesizes their results.\n\n![The orchestrator-workers workflow](assets/05-orchestrator-workers.png)\n\n**When to use this workflow:** This workflow is well-suited for complex tasks where you can't predict the subtasks needed (in coding, for example, the number of files that need to be changed and the nature of the change in each file likely depend on the task). Whereas it's topographically similar, the key difference from parallelization is its flexibility—subtasks aren't pre-defined, but determined by the orchestrator based on the specific input.\n\n**Example where orchestrator-workers is useful:**\n\n- Coding products that make complex changes to multiple files each time.\n- Search tasks that involve gathering and analyzing information from multiple sources for possible relevant information.","target":"### 工作流：编排者-工作者\n\n在编排者-工作者（orchestrator-workers）工作流中，一个中央 LLM 动态地拆解任务，把子任务委派给若干 worker LLM，再综合它们的结果。\n\n![编排者-工作者工作流](assets/05-orchestrator-workers.png)\n\n**何时使用该工作流：**该工作流适合那些无法事先预测所需子任务的复杂场景（例如在编码场景中，需要改动的文件数以及每个文件中的改动性质，往往取决于具体任务）。它在拓扑结构上与并行化相似，但与并行化的关键区别在于其灵活性——子任务并非预定义，而是由编排者根据具体输入动态决定。\n\n**编排者-工作者的适用示例：**\n\n- 每次都会对多个文件做复杂改动的编码产品。\n- 需要从多个来源收集并分析信息、寻找可能相关内容的研究型检索任务。","state":"reviewed","issues":[{"id":"i-acc-001","target_id":"c10.orchestrator_workers","type":"accuracy","severity":"low","status":"closed","scope":"chunk","created_by":"ai","note":"Source likely typo 'topographically' corrected to 'topologically' as '拓扑结构上' per style guide sample. Acceptable choice; no further change.","evidence":{"source_excerpt":"Whereas it's topographically similar, the key difference from parallelization is its flexibility","target_excerpt":"它在拓扑结构上相似，但与并行化的关键区别在于其灵活性"}}]}],"issues":[]},{"id":"c11.evaluator_optimizer","title":"Workflow: Evaluator-optimizer","summary":"一个 LLM 生成、另一个 LLM 评估反馈的循环；适合有清晰评估标准且迭代精化能带来可衡量价值的场景。","state":"reviewed","segments":[{"id":"c11.evaluator_optimizer","source":"### Workflow: Evaluator-optimizer\n\nIn the evaluator-optimizer workflow, one LLM call generates a response while another provides evaluation and feedback in a loop.\n\n![The evaluator-optimizer workflow](assets/06-evaluator-optimizer.png)\n\n**When to use this workflow:** This workflow is particularly effective when we have clear evaluation criteria, and when iterative refinement provides measurable value. The two signs of good fit are, first, that LLM responses can be demonstrably improved when a human articulates their feedback; and second, that the LLM can provide such feedback. This is analogous to the iterative writing process a human writer might go through when producing a polished document.\n\n**Examples where evaluator-optimizer is useful:**\n\n- Literary translation where there are nuances that the translator LLM might not capture initially, but where an evaluator LLM can provide useful critiques.\n- Complex search tasks that require multiple rounds of searching and analysis to gather comprehensive information, where the evaluator decides whether further searches are warranted.","target":"### 工作流：评估者-优化者\n\n在评估者-优化者（evaluator-optimizer）工作流中，一个 LLM 调用负责生成响应，另一个 LLM 调用在循环中提供评估与反馈。\n\n![评估者-优化者工作流](assets/06-evaluator-optimizer.png)\n\n**何时使用该工作流：**当存在明确的评估标准、且迭代精化能带来可衡量的价值时，这一工作流尤其有效。是否适合的两条判断信号是：第一，当人类给出具体反馈时，LLM 的响应能有可被观察到的提升；第二，LLM 本身能提供这样的反馈。这类似于人类作者在写一份打磨好的文档时可能要经历的迭代写作过程。\n\n**评估者-优化者的适用示例：**\n\n- 文学翻译：翻译 LLM 初次翻译时可能无法捕捉到某些细微之处，评估 LLM 可以提供有用的批评意见。\n- 复杂检索任务：需要多轮搜索与分析才能汇总足够信息，评估者决定是否值得继续进一步搜索。","state":"reviewed","issues":[{"id":"i-acc-002","target_id":"c11.evaluator_optimizer","type":"accuracy","severity":"medium","status":"resolved","scope":"chunk","created_by":"ai","note":"'Polished document' (adjective — final refined state) was translated as '润色文章' (verb). Will change to '打磨好的文档'.","evidence":{"source_excerpt":"the iterative writing process a human writer might go through when producing a polished document","target_excerpt":"人类作者在写一篇润色文章时可能要经历的迭代写作过程"}}]}],"issues":[]},{"id":"c12.agents","title":"Agents","summary":"Agents 自主规划与执行多步任务，使用工具并可回到 human-in-the-loop；适合开放问题与不可硬编码路径的任务；列出 coding agent 与 computer use 两个示例。","state":"reviewed","segments":[{"id":"c12.agents","source":"### Agents\n\nAgents are emerging in production as LLMs mature in key capabilities—understanding complex inputs, engaging in reasoning and planning, using tools reliably, and recovering from errors. Agents begin their work with either a command from, or interactive discussion with, the human user. Once the task is clear, agents plan and operate independently, potentially returning to the human for further information or judgement. During execution, it's crucial for the agents to gain \"ground truth\" from the environment at each step (such as tool call results or code execution) to assess its progress. Agents can then pause for human feedback at checkpoints or when encountering blockers. The task often terminates upon completion, but it's also common to include stopping conditions (such as a maximum number of iterations) to maintain control.\n\nAgents can handle sophisticated tasks, but their implementation is often straightforward. They are typically just LLMs using tools based on environmental feedback in a loop. It is therefore crucial to design toolsets and their documentation clearly and thoughtfully. We expand on best practices for tool development in Appendix 2 (\"Prompt Engineering your Tools\").\n\n![Autonomous agent](assets/07-autonomous-agent.png)\n\n**When to use agents:** Agents can be used for open-ended problems where it's difficult or impossible to predict the required number of steps, and where you can't hardcode a fixed path. The LLM will potentially operate for many turns, and you must have some level of trust in its decision-making. Agents' autonomy makes them ideal for scaling tasks in trusted environments.\n\nThe autonomous nature of agents means higher costs, and the potential for compounding errors. We recommend extensive testing in sandboxed environments, along with the appropriate guardrails.\n\n**Examples where agents are useful:**\n\nThe following examples are from our own implementations:\n\n- A coding Agent to resolve [SWE-bench tasks](https://www.anthropic.com/research/swe-bench-sonnet), which involve edits to many files based on a task description;\n- Our [\"computer use\" reference implementation](https://github.com/anthropics/anthropic-quickstarts/tree/main/computer-use-demo), where Claude uses a computer to accomplish tasks.\n\n![High-level flow of a coding agent](assets/08-coding-agent-flow.png)","target":"### 智能体\n\n随着 LLM 在关键能力上日趋成熟——理解复杂输入、参与推理与规划、可靠地使用工具以及从错误中恢复——智能体开始在生产中涌现。智能体的工作起点是接收来自人类用户的一条指令，或与之进行一轮交互式讨论；任务明确后，智能体会自主规划并执行，必要时可再次回到人类处获取更多信息或判断。在执行过程中，关键在于智能体在每一步都从环境获取\"真实信号\"（如工具调用结果或代码执行结果），以此评估自身进展。智能体可以在检查点暂停以征求人类反馈，也可以在遇到阻塞时暂停。任务通常在完成后终止，但通常也会设置停止条件（例如最大迭代次数）以保持可控。\n\n智能体可以处理复杂任务，但它的实现往往很直接——它本质上就是一个基于环境反馈循环使用工具的 LLM。因此，至关重要的是把工具集及其文档设计得清晰且周到。关于工具开发的更多最佳实践，我们在附录 2（\"Prompt Engineering your Tools\"）中展开讨论。\n\n![自主智能体](assets/07-autonomous-agent.png)\n\n**何时使用智能体：**智能体适合那些开放、难以甚至无法预测所需步骤数、且无法硬编码固定路径的问题。LLM 可能需要多轮运行，必须对其决策保有一定信任。智能体的自主性使其成为在受信任环境中规模化任务时的理想选择。\n\n智能体的自主性也意味着更高的成本和复合错误的风险。我们建议在沙盒环境中进行充分测试，并配套适当的护栏。\n\n**智能体的适用示例：**\n\n以下示例来自我们自身的实现：\n\n- 一个用于解决 [SWE-bench 任务](https://www.anthropic.com/research/swe-bench-sonnet) 的编码智能体（coding Agent），该任务会基于任务描述对多个文件做修改；\n- 我们的 [\"computer use（计算机使用）\"参考实现](https://github.com/anthropics/anthropic-quickstarts/tree/main/computer-use-demo)，其中 Claude 通过操作计算机来完成任务。\n\n![编码智能体高层流程](assets/08-coding-agent-flow.png)","state":"reviewed","issues":[{"id":"i-term-002b","target_id":"c12.agents","type":"term","severity":"medium","status":"resolved","scope":"global","created_by":"ai","note":"'guardrails' → '护栏' consistency; same global fix as i-term-002 applied here.","evidence":{"source_excerpt":"We recommend extensive testing in sandboxed environments, along with the appropriate guardrails.","target_excerpt":"我们建议在沙盒环境中进行充分测试，并配套适当的安全护栏。"}}]}],"issues":[]},{"id":"c13.combining","title":"Combining and customizing these patterns","summary":"强调上述模式非处方，可按需组合；与任何 LLM 功能一样，关键是测量与迭代，仅在确有提升时增加复杂度。","state":"reviewed","segments":[{"id":"c13.combining","source":"## Combining and customizing these patterns\n\nThese building blocks aren't prescriptive. They're common patterns that developers can shape and combine to fit different use cases. The key to success, as with any LLM features, is measuring performance and iterating on implementations. To repeat: you should consider adding complexity _only_ when it demonstrably improves outcomes.","target":"## 组合与定制这些模式\n\n这些构建块并不是一成不变的处方。它们是开发者可以根据不同用例塑形与组合的常见模式。成功的关键，与任何 LLM 能力一样，在于对实现进行度量与迭代。再次强调：**只有**在确有可被验证的提升时，才考虑增加复杂度。","state":"reviewed","issues":[{"id":"i-str-001","target_id":"c13.combining","type":"format","severity":"medium","status":"resolved","scope":"chunk","created_by":"ai","note":"Italic emphasis on '_only_' in source is lost; will recover as **只有** in revised target.","evidence":{"source_excerpt":"you should consider adding complexity _only_ when it demonstrably improves outcomes.","target_excerpt":"只有在确有可被验证的提升时，才考虑增加复杂度。"}}]}],"issues":[]},{"id":"c14.summary","title":"Summary and three core principles","summary":"总结：成功率取决于选对系统而非最复杂系统；提出三条核心原则：simplicity / transparency / agent-computer interface (ACI)；并附 acknowledgements。","state":"reviewed","segments":[{"id":"c14.summary","source":"## Summary\n\nSuccess in the LLM space isn't about building the most sophisticated system. It's about building the _right_ system for your needs. Start with simple prompts, optimize them with comprehensive evaluation, and add multi-step agentic systems only when simpler solutions fall short.\n\nWhen implementing agents, we try to follow three core principles:\n\n1. Maintain **simplicity** in your agent's design.\n2. Prioritize **transparency** by explicitly showing the agent's planning steps.\n3. Carefully craft your agent-computer interface (ACI) through thorough tool **documentation and testing**.\n\nFrameworks can help you get started quickly, but don't hesitate to reduce abstraction layers and build with basic components as you move to production. By following these principles, you can create agents that are not only powerful but also reliable, maintainable, and trusted by their users.\n\n### Acknowledgements\n\nWritten by Erik S. and Barry Zhang. This work draws upon our experiences building agents at Anthropic and the valuable insights shared by our customers, for which we're deeply grateful.","target":"## 小结\n\n在 LLM 领域取得成功，不在于构建最复杂的系统，而在于为你的需求构建**对**的系统。从简单的 prompt 起步，用完善的评估机制去优化它，只有在更简单的方案不够用时，再引入多步的智能体系统。\n\n在实现智能体时，我们尝试遵循三条核心原则：\n\n1. 在智能体设计中保持**简洁（simplicity）**。\n2. 优先保证**透明（transparency）**，把智能体的规划步骤显式呈现出来。\n3. 通过充分的工具**文档与测试**，精心打造你的智能体-计算机接口（ACI）。\n\n框架能帮你快速起步，但在向生产推进时，不要犹豫去削减抽象层、回归基础组件。遵循这些原则，你可以打造出不仅强大、而且可靠、易维护、值得用户信任的智能体。\n\n### 致谢\n\n本文由 Erik S. 与 Barry Zhang 撰写。文中观点综合了我们在 Anthropic 构建智能体的亲身实践以及客户分享的宝贵洞见，我们对此深表感谢。","state":"reviewed","issues":[{"id":"i-str-002","target_id":"c14.summary","type":"format","severity":"medium","status":"resolved","scope":"chunk","created_by":"ai","note":"Italic emphasis on '_right_' converted to 「对」 quotation marks; will change to **对** to preserve emphasis style.","evidence":{"source_excerpt":"It's about building the _right_ system for your needs.","target_excerpt":"而在于为你的需求构建「对」的系统。"}},{"id":"i-add-006","target_id":"c14.summary","type":"addition","severity":"low","status":"open","scope":"global","created_by":"ai","note":"'prompt' appears 10+ times and is uniformly retained as English. Worth adding to glossary as a confirmed term (status: confirmed, target: prompt).","evidence":{"source_excerpt":"Start with simple prompts, optimize them with comprehensive evaluation","target_excerpt":"从简单的 prompt 起步，用完善的评估机制去优化它"}}]}],"issues":[]},{"id":"c15.appendix1_intro","title":"Appendix 1: Agents in practice (intro)","summary":"Appendix 1 引入：两个 agent 实际应用领域，均需对话+动作、明确成功标准、可反馈循环、人类监督。","state":"reviewed","segments":[{"id":"c15.appendix1_intro","source":"## Appendix 1: Agents in practice\n\nOur work with customers has revealed two particularly promising applications for AI agents that demonstrate the practical value of the patterns discussed above. Both applications illustrate how agents add the most value for tasks that require both conversation and action, have clear success criteria, enable feedback loops, and integrate meaningful human oversight.","target":"## 附录 1：智能体的实际应用\n\n在与客户合作的过程中，我们发现了两个特别有前景的 AI 智能体应用场景，能很好地展示上文所述模式的实际价值。这两个应用都体现了智能体在以下几类任务中能带来最大价值：既需要对话又需要动作、具备明确的成功标准、可形成反馈循环、并能融入有意义的人类监督。","state":"reviewed","issues":[]}],"issues":[]},{"id":"c16.customer_support","title":"A. Customer support","summary":"客服场景适配 agents：自然对话流 + 外部数据/动作接入 + 退款等可编程动作 + 用户定义的成功衡量。","state":"reviewed","segments":[{"id":"c16.customer_support","source":"### A. Customer support\n\nCustomer support combines familiar chatbot interfaces with enhanced capabilities through tool integration. This is a natural fit for more open-ended agents because:\n\n- Support interactions naturally follow a conversation flow while requiring access to external information and actions;\n- Tools can be integrated to pull customer data, order history, and knowledge base articles;\n- Actions such as issuing refunds or updating tickets can be handled programmatically; and\n- Success can be clearly measured through user-defined resolutions.\n\nSeveral companies have demonstrated the viability of this approach through usage-based pricing models that charge only for successful resolutions, showing confidence in their agents' effectiveness.","target":"### A. 客服\n\n客服场景把大家熟悉的聊天机器人界面与工具集成带来的增强能力结合在一起。它天然适合较为开放式的智能体，原因如下：\n\n- 客服交互天然遵循对话流，同时需要访问外部信息与执行外部动作；\n- 工具可以集成进来，拉取客户数据、订单历史与知识库条目；\n- 退款、改单等动作可以通过编程方式处理；\n- 成功与否可以通过用户定义的「问题已解决」明确度量。\n\n已有若干公司通过按用量计费（仅对成功解决的问题收费）的商业模式证明了这一路径的可行性——这本身就是对自家智能体有效性的信心体现。","state":"reviewed","issues":[]}],"issues":[]},{"id":"c17.coding_agents","title":"B. Coding agents","summary":"编码场景适配 agents：测试可验证、反馈可迭代、问题空间明确、质量可衡量；SWE-bench Verified 上 Anthropic 已能基于 PR 描述解 GitHub issue。","state":"reviewed","segments":[{"id":"c17.coding_agents","source":"### B. Coding agents\n\nThe software development space has shown remarkable potential for LLM features, with capabilities evolving from code completion to autonomous problem-solving. Agents are particularly effective because:\n\n- Code solutions are verifiable through automated tests;\n- Agents can iterate on solutions using test results as feedback;\n- The problem space is well-defined and structured; and\n- Output quality can be measured objectively.\n\nIn our own implementation, agents can now solve real GitHub issues in the [SWE-bench Verified](https://www.anthropic.com/research/swe-bench-sonnet) benchmark based on the pull request description alone. However, whereas automated testing helps verify functionality, human review remains crucial for ensuring solutions align with broader system requirements.","target":"### B. 编码智能体\n\n软件开发领域已展现出 LLM 能力的巨大潜力——相关能力从最初的代码补全，一路演进到了自主问题求解。智能体在这一领域特别有效，原因如下：\n\n- 代码方案可以通过自动化测试验证；\n- 智能体可以利用测试结果作为反馈来迭代方案；\n- 问题空间定义明确、结构清晰；\n- 输出质量可以客观度量。\n\n在我们自己的实现中，智能体现在已经能够仅凭 PR 描述在 [SWE-bench Verified](https://www.anthropic.com/research/swe-bench-sonnet) 基准上解决真实的 GitHub issue。然而，自动化测试虽能验证功能正确性，人类审阅仍然至关重要——它能确保方案契合更广泛的系统要求。","state":"reviewed","issues":[]}],"issues":[]},{"id":"c18.appendix2","title":"Appendix 2: Prompt engineering your tools","summary":"工具即 agent 的人机接口（ACI）。给出工具格式建议（给足思考 token、贴近自然文本、避免格式开销）与 4 条 ACI 设计准则；SWE-bench 工具设计经验：强制绝对路径显著减少错误。","state":"reviewed","segments":[{"id":"c18.appendix2","source":"## Appendix 2: Prompt engineering your tools\n\nNo matter which agentic system you're building, tools will likely be an important part of your agent. [Tools](https://www.anthropic.com/news/tool-use-ga) enable Claude to interact with external services and APIs by specifying their exact structure and definition in our API. When Claude responds, it will include a [tool use block](https://docs.anthropic.com/en/docs/build-with-claude/tool-use#example-api-response-with-a-tool-use-content-block) in the API response if it plans to invoke a tool. Tool definitions and specifications should be given just as much prompt engineering attention as your overall prompts. In this brief appendix, we describe how to prompt engineer your tools.\n\nThere are often several ways to specify the same action. For instance, you can specify a file edit by writing a diff, or by rewriting the entire file. For structured output, you can return code inside markdown or inside JSON. In software engineering, differences like these are cosmetic and can be converted losslessly from one to the other. However, some formats are much more difficult for an LLM to write than others. Writing a diff requires knowing how many lines are changing in the chunk header before the new code is written. Writing code inside JSON (compared to markdown) requires extra escaping of newlines and quotes.\n\nOur suggestions for deciding on tool formats are the following:\n\n- Give the model enough tokens to \"think\" before it writes itself into a corner.\n- Keep the format close to what the model has seen naturally occurring in text on the internet.\n- Make sure there's no formatting \"overhead\" such as having to keep an accurate count of thousands of lines of code, or string-escaping any code it writes.\n\nOne rule of thumb is to think about how much effort goes into human-computer interfaces (HCI), and plan to invest just as much effort in creating good _agent_-computer interfaces (ACI). Here are some thoughts on how to do so:\n\n- Put yourself in the model's shoes. Is it obvious how to use this tool, based on the description and parameters, or would you need to think carefully about it? If so, then it's probably also true for the model. A good tool definition often includes example usage, edge cases, input format requirements, and clear boundaries from other tools.\n- How can you change parameter names or descriptions to make things more obvious? Think of this as writing a great docstring for a junior developer on your team. This is especially important when using many similar tools.\n- Test how the model uses your tools: Run many example inputs in our [workbench](https://console.anthropic.com/workbench) to see what mistakes the model makes, and iterate.\n- [Poka-yoke](https://en.wikipedia.org/wiki/Poka-yoke) your tools. Change the arguments so that it is harder to make mistakes.\n\nWhile building our agent for [SWE-bench](https://www.anthropic.com/research/swe-bench-sonnet), we actually spent more time optimizing our tools than the overall prompt. For example, we found that the model would make mistakes with tools using relative filepaths after the agent had moved out of the root directory. To fix this, we changed the tool to always require absolute filepaths—and we found that the model used this method flawlessly.","target":"## 附录 2：工具的 Prompt 工程\n\n无论你在构建哪种智能体系统，工具很可能都是你的智能体中重要的一环。[工具（tools）](https://www.anthropic.com/news/tool-use-ga) 让 Claude 能够通过我们在 API 中规定的精确结构与定义，与外部服务和 API 交互。当 Claude 决定要调用某个工具时，它会在 API 响应中包含一个 [工具使用块（tool use block）](https://docs.anthropic.com/en/docs/build-with-claude/tool-use#example-api-response-with-a-tool-use-content-block)。对工具定义与规范的工程重视程度，应当与对整体 prompt 的重视程度相当。在这篇简短的附录中，我们介绍如何对工具做 prompt 工程。\n\n指定同一个动作往往有多种方式。例如，你可以用 diff 来描述一次文件编辑，也可以用「重写整个文件」的方式描述；返回结构化输出时，你可以把代码放在 markdown 里，也可以放在 JSON 里。在软件工程中，这类差异本质上是表面的，可以无损地相互转换。然而，对 LLM 来说，某些格式写起来比另一些要难得多：写 diff 需要在写出新代码之前，先知道在 chunk 头部究竟要改多少行；把代码放进 JSON（相比放进 markdown）则需要对换行与引号做额外的转义。\n\n关于如何决定工具的格式，我们的建议是：\n\n- 给模型留出足够的 token 去\"思考\"，别让它一上来就把自己逼入死胡同。\n- 让格式尽量贴近模型在互联网自然文本中见过的样子。\n- 避免任何额外的\"格式开销\"——比如让它在写代码时还要精确统计上千行的数量，或对写出的代码做转义。\n\n一个经验法则是：人机界面（HCI）需要花多少精力，**智能体**-计算机接口（ACI）就值得你花同样多的精力。下面是一些具体做法：\n\n- 把自己放到模型的位置上：只看工具的描述与参数，你能不能一眼看出怎么用？如果需要仔细琢磨，那模型多半也一样。一份好的工具定义通常要包含使用示例、边界情况、输入格式要求，以及与其他工具的清晰边界。\n- 如何调整参数名或描述，让意图更明显？把它想象成在给团队里的初级开发者写一份优秀的 docstring——这在使用大量相似工具时尤其重要。\n- 测试模型如何使用你的工具：在我们的 [workbench](https://console.anthropic.com/workbench) 中跑大量样例输入，观察模型常犯哪些错误，并据此迭代。\n- 对你的工具做 [Poka-yoke（防错法）](https://en.wikipedia.org/wiki/Poka-yoke)。调整参数设计，让误用变得难以发生。\n\n在为 [SWE-bench](https://www.anthropic.com/research/swe-bench-sonnet) 构建智能体的过程中，我们花在优化工具上的时间其实多于花在优化整体 prompt 上的时间。例如我们发现：当智能体离开根目录后，使用相对路径的工具会让模型出错。为解决这一问题，我们把工具改为始终要求绝对路径——之后模型用这套方式表现得毫无瑕疵。","state":"reviewed","issues":[{"id":"i-str-003","target_id":"c18.appendix2","type":"format","severity":"medium","status":"resolved","scope":"chunk","created_by":"ai","note":"Italic on '_agent_' in '_agent_-computer interfaces' is lost; will recover as **智能体**-计算机接口 to preserve HCI↔ACI parallel emphasis.","evidence":{"source_excerpt":"creating good _agent_-computer interfaces (ACI)","target_excerpt":"智能体-计算机接口（ACI）就值得你花同样多的精力"}},{"id":"i-omit-005","target_id":"c18.appendix2","type":"omission","severity":"medium","status":"resolved","scope":"chunk","created_by":"ai","note":"'your agent' framing in opening sentence of Appendix 2 is lost — the pronoun '其中' shifts referent to 'agentic system'. Will rewrite to make '你的智能体' explicit.","evidence":{"source_excerpt":"tools will likely be an important part of your agent","target_excerpt":"工具很可能都是其中重要的一环"}},{"id":"i-acc-003","target_id":"c18.appendix2","type":"accuracy","severity":"low","status":"closed","scope":"chunk","created_by":"ai","note":"Conditional structure 'When X, will Y if Z' restructured in target. Practical meaning preserved, frame swap is minor. Acceptable; no further change.","evidence":{"source_excerpt":"When Claude responds, it will include a tool use block in the API response if it plans to invoke a tool.","target_excerpt":"当 Claude 决定要调用某个工具时，它会在 API 响应中包含一个 [工具使用块]"}},{"id":"i-add-007","target_id":"c18.appendix2","type":"addition","severity":"low","status":"open","scope":"chunk","created_by":"ai","note":"'docstring' appears once in c18 and is kept verbatim. Consider adding to glossary for cross-project consistency (target: docstring).","evidence":{"source_excerpt":"writing a great docstring for a junior developer on your team","target_excerpt":"在给团队里的初级开发者写一份优秀的 docstring"}}]}],"issues":[]}]}</script>

  <script>
    const raw = document.getElementById("translationstack-data").textContent.trim();
    const data = parseData(raw);
    const $ = (selector) => document.querySelector(selector);

    function parseData(rawText) {
      if (!rawText || rawText === "__TRANSLATIONSTACK_DATA__") {
        return {
          project: {
            name: "TranslationStack Review Template",
            summary: "Render this file through TranslationStack to embed project data.",
          },
          stats: {},
          glossary: [],
          chunks: [],
        };
      }

      try {
        return JSON.parse(rawText);
      } catch (error) {
        return {
          project: {
            name: "TranslationStack Review Data Error",
            summary: `Invalid embedded JSON: ${error.message}`,
          },
          stats: {},
          glossary: [],
          chunks: [],
        };
      }
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function field(object, ...keys) {
      for (const key of keys) {
        if (object && object[key] !== undefined && object[key] !== null && object[key] !== "") {
          return object[key];
        }
      }
      return "";
    }

    function asNumber(value) {
      const number = Number(value);
      return Number.isFinite(number) ? number : null;
    }

    function statNumber(stats, ...keys) {
      for (const key of keys) {
        const value = asNumber(stats?.[key]);
        if (value !== null) return value;
      }
      return null;
    }

    function stateClass(value) {
      return String(value || "pending").toLowerCase().replace(/[^a-z0-9_-]/g, "-");
    }

    function plural(count, singular, pluralValue) {
      return `${count} ${count === 1 ? singular : pluralValue}`;
    }

    function isBlockingState(value) {
      return ["stale", "blocked"].includes(stateClass(value));
    }

    function isTranslatedState(value) {
      return ["translated", "reviewing", "reviewed", "stale", "exported"].includes(stateClass(value));
    }

    function isReviewedState(value) {
      return ["reviewed", "exported"].includes(stateClass(value));
    }

    function isOpenIssue(issue) {
      const status = stateClass(field(issue, "status") || "open");
      return !["closed", "resolved", "done"].includes(status);
    }

    function chunkIssueCount(chunk, openOnly = true) {
      let count = Array.isArray(chunk.issues) ? chunk.issues.length : 0;
      for (const segment of chunk.segments || []) {
        count += Array.isArray(segment.issues) ? segment.issues.length : 0;
      }
      if (!openOnly) return count;

      const chunkIssues = Array.isArray(chunk.issues) ? chunk.issues.filter(isOpenIssue).length : 0;
      const segmentIssues = (chunk.segments || []).reduce(
        (sum, segment) => sum + (Array.isArray(segment.issues) ? segment.issues.filter(isOpenIssue).length : 0),
        0
      );
      return chunkIssues + segmentIssues;
    }

    function chunkIsBlocked(chunk) {
      return isBlockingState(chunk.state) || (chunk.segments || []).some((segment) => isBlockingState(segment.status || segment.state));
    }

    function chunkIsTranslated(chunk) {
      if (isTranslatedState(chunk.state)) return true;
      return (chunk.segments || []).some((segment) => Boolean(field(segment, "target", "target_markdown", "translation")));
    }

    function chunkIsReviewed(chunk) {
      return isReviewedState(chunk.state) || (chunk.segments || []).some((segment) => isReviewedState(segment.status || segment.state));
    }

    function statBlockedCount(stats, chunks) {
      const stale = statNumber(stats, "stale", "staleCount", "stale_count");
      const blocked = statNumber(stats, "blocked", "blockedCount", "blocked_count");
      if (stale !== null || blocked !== null) return (stale || 0) + (blocked || 0);
      return chunks.filter(chunkIsBlocked).length;
    }

    function renderMeta() {
      const project = data.project || {};
      const name = field(project, "name", "title") || "Translation Review";
      const source = field(project, "sourceLanguage", "source_language") || "Source";
      const target = field(project, "targetLanguage", "target_language") || "Target";
      const domain = field(project, "domain") || "General";
      const summary = field(project, "summary", "description");

      document.getElementById("project-title").textContent = name;
      document.getElementById("project-subtitle").textContent =
        summary || `${source} -> ${target} · ${domain} · review before export`;

      const meta = [
        field(project, "id") && `project: ${field(project, "id")}`,
        field(project, "generatedAt", "generated_at") && `generated: ${field(project, "generatedAt", "generated_at")}`,
        domain && `domain: ${domain}`,
        source && `source: ${source}`,
        target && `target: ${target}`,
      ].filter(Boolean);

      $("#project-meta").innerHTML = meta
        .map((item) => `<span class="meta-chip">${escapeHtml(item)}</span>`)
        .join("");
    }

    function renderStats() {
      const stats = data.stats || {};
      const chunks = data.chunks || [];
      const derivedIssueCount = chunks.reduce((sum, chunk) => sum + chunkIssueCount(chunk), 0);
      const blockedCount = statBlockedCount(stats, chunks);
      const reviewedCount = chunks.filter(chunkIsReviewed).length;
      const translatedCount = chunks.filter(chunkIsTranslated).length;
      const statsChunks = statNumber(stats, "chunks", "chunkCount", "chunk_count");
      const statsTranslated = statNumber(stats, "translated", "translatedCount", "translated_count");
      const statsReviewed = statNumber(stats, "reviewed", "reviewedCount", "reviewed_count");
      const statsIssues = statNumber(stats, "openIssues", "open_issues", "issues", "issueCount", "issue_count");

      const items = [
        ["Chunks", statsChunks ?? chunks.length, "semantic units"],
        ["Translated", statsTranslated ?? translatedCount, "has target text or translated state"],
        ["Reviewed", statsReviewed ?? reviewedCount, "review/export states"],
        ["Open Issues", statsIssues ?? derivedIssueCount, "from chunk and segment notes"],
        ["Blocked", blockedCount, "stale or blocked chunks"],
      ];

      $("#project-stats").innerHTML = items
        .map(([label, value, foot]) => `
          <div class="metric">
            <div class="metric-label">${escapeHtml(label)}</div>
            <span class="metric-value">${escapeHtml(value)}</span>
            <div class="metric-foot">${escapeHtml(foot)}</div>
          </div>
        `)
        .join("");
    }

    function renderGlossary() {
      const glossary = data.glossary || [];
      if (!glossary.length) {
        $("#glossary").innerHTML = `<div class="empty">terms: 0 · status: no confirmed glossary entries</div>`;
        return;
      }

      $("#glossary").innerHTML = `
        <div class="intent-grid">
          <div class="intent-row header">
            <div class="intent-cell">Source</div>
            <div class="intent-cell">Target</div>
            <div class="intent-cell">Evidence</div>
          </div>
          ${glossary.map((term) => `
            <div class="intent-row">
              <div class="intent-cell mono">${escapeHtml(field(term, "source", "term", "id"))}</div>
              <div class="intent-cell"><strong>${escapeHtml(field(term, "target", "translation", "zh"))}</strong></div>
              <div class="intent-cell mono">${escapeHtml(field(term, "note", "notes", "status") || "confirmed: true")}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderIssue(issue, fallbackSegmentId) {
      const severity = field(issue, "severity") || "open";
      const type = field(issue, "type", "category") || "issue";
      const note = field(issue, "note", "message", "description") || "";
      const status = field(issue, "status") || "open";
      const issueId = field(issue, "id");
      const segmentId = field(issue, "segment_id", "segmentId") || fallbackSegmentId || "";
      return `
        <div class="issue">
          <strong>${escapeHtml(type)}</strong>
          <div class="text-block">${escapeHtml(note)}</div>
          <div class="evidence">${issueId ? `id: ${escapeHtml(issueId)} · ` : ""}status: ${escapeHtml(status)} · severity: ${escapeHtml(severity)}${segmentId ? ` · target: ${escapeHtml(segmentId)}` : ""}</div>
        </div>
      `;
    }

    function renderChunks() {
      const chunks = data.chunks || [];
      if (!chunks.length) {
        $("#chunks").innerHTML = `<div class="empty">chunks: 0 · status: no translation chunks loaded</div>`;
        return;
      }

      $("#chunks").innerHTML = chunks
        .map((chunk, index) => {
          const state = stateClass(chunk.state);
          const issueCount = chunkIssueCount(chunk);
          const isBlocked = chunkIsBlocked(chunk);
          const segmentCount = (chunk.segments || []).length;
          const openAttribute = issueCount || isBlocked || index === 0 ? " open" : "";
          return `
            <details class="chunk-card" data-has-issues="${issueCount > 0}" data-is-blocked="${isBlocked}"${openAttribute}>
              <summary>
                <span class="chunk-title">
                  <strong>${escapeHtml(chunk.id)} · ${escapeHtml(chunk.title || "Untitled chunk")}</strong>
                  <span>${escapeHtml(chunk.summary || chunk.source_summary || "")}</span>
                </span>
                <span class="count-badge">${escapeHtml(plural(segmentCount, "segment", "segments"))}</span>
                <span class="state-badge ${escapeHtml(state)}">${escapeHtml(chunk.state || "pending")}</span>
              </summary>
              <div class="chunk-body">
                ${chunk.summary || chunk.source_summary ? `<p class="chunk-summary">${escapeHtml(chunk.summary || chunk.source_summary)}</p>` : ""}
                <div class="overflow-wrap">
                  <div class="segment-grid">
                    <div class="segment-row header">
                      <div class="segment-cell">Anchor</div>
                      <div class="segment-cell">Source</div>
                      <div class="segment-cell">Target</div>
                    </div>
                    ${(chunk.segments || []).map((seg) => `
                      <div class="segment-row" id="${escapeHtml(seg.id)}">
                        <div class="segment-cell segment-id">${escapeHtml(seg.id || chunk.id)}${seg.status || seg.state ? `<div>${escapeHtml(seg.status || seg.state)}</div>` : ""}</div>
                        <div class="segment-cell text-block">${escapeHtml(field(seg, "source", "source_markdown"))}</div>
                        <div class="segment-cell text-block target-block">${escapeHtml(field(seg, "target", "target_markdown", "translation"))}</div>
                      </div>
                    `).join("")}
                    ${segmentCount === 0 ? `
                      <div class="segment-row">
                        <div class="segment-cell segment-id">${escapeHtml(chunk.id)}</div>
                        <div class="segment-cell text-block">No segment rows.</div>
                        <div class="segment-cell text-block target-block">Provide chunk-level or segment-level translation data before review.</div>
                      </div>
                    ` : ""}
                  </div>
                </div>
                ${Array.isArray(chunk.issues) && chunk.issues.length ? `
                  <div class="issue-list">
                    ${chunk.issues.map((issue) => renderIssue(issue, chunk.id)).join("")}
                  </div>
                ` : ""}
                ${(chunk.segments || []).some((seg) => Array.isArray(seg.issues) && seg.issues.length) ? `
                  <div class="issue-list">
                    ${(chunk.segments || []).flatMap((seg) => (seg.issues || []).map((issue) => renderIssue(issue, seg.id))).join("")}
                  </div>
                ` : ""}
              </div>
            </details>
          `;
        })
        .join("");
    }

    function renderReviewNotes() {
      const stats = data.stats || {};
      const chunks = data.chunks || [];
      const issueCount = statNumber(stats, "openIssues", "open_issues", "issues", "issueCount", "issue_count") ?? chunks.reduce((sum, chunk) => sum + chunkIssueCount(chunk), 0);
      const blockedCount = statBlockedCount(stats, chunks);
      const total = statNumber(stats, "chunks", "chunkCount", "chunk_count") ?? chunks.length;
      const reviewed = statNumber(stats, "reviewed", "reviewedCount", "reviewed_count") ?? chunks.filter(chunkIsReviewed).length;
      const ready = total > 0 && issueCount === 0 && blockedCount === 0 && reviewed === total;

      $("#review-notes").innerHTML = `
        <div class="info-card">
          <h3>导出状态：${ready ? "可导出" : "暂缓"}</h3>
          <p>${ready ? "所有 chunk 已审校，且没有打开的 issue 或 stale/blocked 状态。" : "导出前先处理 open issue、stale chunk、blocked chunk 与未审校段落。"}</p>
          <div class="evidence">chunks: ${escapeHtml(total)} · reviewed: ${escapeHtml(reviewed)} · issues: ${escapeHtml(issueCount)} · blocked_or_stale: ${escapeHtml(blockedCount)}</div>
        </div>
        <div class="info-card">
          <h3>审校重点：术语与覆盖</h3>
          <p>检查 source anchor、术语一致性、target 空值、跨 chunk 指代与高严重度问题。全局术语变化应先产生 impact report，再标记受影响 chunk。</p>
          <div class="evidence">rules: glossary impact · marker preservation · export policy</div>
        </div>
      `;
    }

    function bindTabs() {
      const buttons = Array.from(document.querySelectorAll("#chunk-tabs button"));
      const cards = () => Array.from(document.querySelectorAll(".chunk-card"));
      const empty = document.querySelector("#chunk-filter-empty");
      buttons.forEach((button) => {
        button.addEventListener("click", () => {
          const filter = button.dataset.filter;
          buttons.forEach((item) => {
            const active = item === button;
            item.classList.toggle("active", active);
            item.setAttribute("aria-pressed", String(active));
          });
          let visibleCount = 0;
          cards().forEach((card) => {
            const visible =
              filter === "all" ||
              (filter === "issues" && card.dataset.hasIssues === "true") ||
              (filter === "blocked" && card.dataset.isBlocked === "true");
            card.hidden = !visible;
            if (visible) visibleCount += 1;
          });
          if (empty) {
            const label = button.textContent.trim();
            empty.textContent = `filter: ${label} · matches: ${visibleCount}`;
            empty.classList.toggle("visible", visibleCount === 0);
          }
        });
      });
    }

    function bindMainTabs() {
      const buttons = Array.from(document.querySelectorAll(".top-nav [role='tab']"));
      const panels = Array.from(document.querySelectorAll(".panel"));

      function activate(button, shouldFocus = false) {
        const panelId = button.dataset.panel;
        buttons.forEach((item) => {
          const active = item === button;
          item.classList.toggle("active", active);
          item.setAttribute("aria-selected", String(active));
          item.tabIndex = active ? 0 : -1;
        });
        panels.forEach((panel) => {
          panel.hidden = panel.id !== panelId;
        });
        if (shouldFocus) button.focus();
      }

      buttons.forEach((button, index) => {
        button.tabIndex = button.classList.contains("active") ? 0 : -1;
        button.addEventListener("click", () => activate(button));
        button.addEventListener("keydown", (event) => {
          const keyMap = {
            ArrowRight: 1,
            ArrowDown: 1,
            ArrowLeft: -1,
            ArrowUp: -1,
          };
          if (event.key === "Home") {
            event.preventDefault();
            activate(buttons[0], true);
            return;
          }
          if (event.key === "End") {
            event.preventDefault();
            activate(buttons[buttons.length - 1], true);
            return;
          }
          if (!(event.key in keyMap)) return;
          event.preventDefault();
          const nextIndex = (index + keyMap[event.key] + buttons.length) % buttons.length;
          activate(buttons[nextIndex], true);
        });
      });
    }

    renderMeta();
    renderStats();
    renderGlossary();
    renderChunks();
    renderReviewNotes();
    bindMainTabs();
    bindTabs();
  </script>
</body>
</html>
